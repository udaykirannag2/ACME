version: 2

sources:
  - name: curated_crm
    description: "Curated CRM data — Iceberg tables via Redshift Spectrum"
    schema: acme_finance_curated_dev
    database: dev
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: _ingest_date

    tables:
      - name: account
        description: "CRM accounts (maps to customers)"
        columns:
          - name: account_id
            tests: [unique, not_null]
      - name: opportunity
        description: "Sales opportunities"
        columns:
          - name: opportunity_id
            tests: [unique, not_null]
      - name: opportunity_line
        description: "Opportunity line items by product"
      - name: arr_movement
        description: "ARR changes: new, expansion, contraction, churn"
      - name: pipeline_snapshot
        description: "Monthly pipeline snapshot by stage"
