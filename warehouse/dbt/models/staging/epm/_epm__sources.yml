version: 2

sources:
  - name: curated_epm
    description: "Curated EPM data — budgets, forecasts, plans via Redshift Spectrum"
    schema: acme_finance_curated_dev
    database: dev
    freshness:
      warn_after: {count: 49, period: hour}
      error_after: {count: 97, period: hour}
    loaded_at_field: _ingest_date

    tables:
      - name: budget_version
        description: "Annual budget versions (e.g., FY25 Board Budget)"
        columns:
          - name: budget_version_id
            tests: [unique, not_null]
      - name: plan_line
        description: "Budget/forecast line items by account, cost center, period"
      - name: forecast_version
        description: "Rolling forecast versions"
        columns:
          - name: forecast_version_id
            tests: [unique, not_null]
      - name: driver_assumption
        description: "Business driver assumptions for forecast models"
      - name: headcount_plan
        description: "Headcount plan by cost center and period"
